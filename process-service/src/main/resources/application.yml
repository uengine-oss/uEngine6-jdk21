
server:
  port: 9094
  error:
    include-message: always
    include-binding-errors: always
    # 기본은 message만 내려주고, 필요할 때만 `?trace=true`로 stacktrace를 노출
    include-stacktrace: on_param
    include-exception: false

spring:
  application:
    name: process

  main:
    allow-bean-definition-overriding: true
---
uengine:
  definition:
    basePath: ${UENGINE_BASEPATH:/Users/heon/Documents/workspace/uEngine6-bpm}
  # 감사 로그: 저장소 유연 구성 (jpa | file | composite | none)
  audit:
    sink: none     # Method 0: None (기본)
    # sink: jpa      # Method 1: DB 
    # sink: file       # Method 2: File (경로는 file.basePath만 사용, definition과 별도)
    # file:
    #   basePath: ${UENGINE_AUDIT_BASEPATH:/Users/heon/Documents/workspace/uEngine6-bpm/bpm-audit-log}
    #   format: json
    # sink: composite # Method 3: Composite
    # sinkNames: jpa,file

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    # platform: h2
    # # H2 전용: HIBERNATE_SEQUENCE 생성 (GenerationType.AUTO 시퀀스 오류 방지)
    # schema: classpath:schema-h2.sql
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true

  cloud:
    function:
      definition: bpm
    stream:
      kafka:
        binder:
          brokers: localhost:9092
        streams:
          binder:
            configuration:
              default:
                key:
                  serde: org.apache.kafka.common.serialization.Serdes$StringSerde
                value:
                  serde: org.apache.kafka.common.serialization.Serdes$StringSerde
      bindings:
        bpm-in-0:
          group: bpm
          destination: bpm-topic
          contentType: application/json
        bpm-out:
          destination: bpm-topic
          contentType: application/json
        bpm-brodcast:
          destination: bpm-brodcast
          contentType: application/json

logging:
  level:
    org.hibernate.type: trace
    org.springframework.cloud: debug

filter:
  payload:
    enabled: true

mail:
  enabled: true
  smtp:
    host: smtp.gmail.com
    port: 587
    auth: true
    starttls:
      enable: true
    ssl:
      trust: smtp.gmail.com
    username: lee #${MAIL_USERNAME}
    password: 123 #${MAIL_PASSWORD}

keycloak:
  url: http://localhost:9090
  realm: master
  clientId: admin-cli
  username: ${KEYCLOAK_USERNAME}
  password: ${KEYCLOAK_PASSWORD}



---

server:
  port: 8080
spring:
  config:
    activate:
      on-profile: docker
  cloud:
    function:
      definition: bpm
    stream:
      kafka:
        binder:
          brokers: my-kafka:9092
        streams:
          binder:
            configuration:
              default:
                key:
                  serde: org.apache.kafka.common.serialization.Serdes$StringSerde
                value:
                  serde: org.apache.kafka.common.serialization.Serdes$StringSerde
      bindings:
        bpm-in-0:
          group: bpm
          destination: bpm-topic
          contentType: application/json
        bpm-out:
          destination: bpm-topic
          contentType: application/json
        bpm-brodcast:
          destination: bpm-brodcast
          contentType: application/json

---
# DB: Oracle (oracle 폴더 Docker 실행 후 SPRING_PROFILES_ACTIVE=oracle)
# Oracle 컨테이너가 완전히 뜬 뒤(2~3분) 앱 실행. system/oracle = docker-compose ORACLE_PASSWORD.
# (APP_USER uengine는 첫 기동 시에만 생성되므로, 크래시 후 재기동한 DB는 system 사용)
spring:
  config:
    activate:
      on-profile: oracle
  datasource:
    url: jdbc:oracle:thin:@${ORACLE_HOST:localhost}:${ORACLE_PORT:1521}:XE
    username: ${ORACLE_USER:system}
    password: ${ORACLE_PASSWORD:oracle}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      connection-timeout: 30000
      initialization-fail-timeout: 30000
  jpa:
    database-platform: org.uengine.five.config.Oracle12cDialectWithRegexp
    hibernate:
      ddl-auto: update