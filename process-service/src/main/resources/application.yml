spring:
  application:
    name: process
  main:
    allow-bean-definition-overriding: true
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    properties:
      hibernate:
        # native SQL 의 {h-schema} 및 JPQL 테이블 prefix. WAS(LBM)=lbm, 로컬은 UENGINE_DB_SCHEMA= 로 비우거나 public
        default_schema: ${UENGINE_DB_SCHEMA:lbm}

server:
  port: 9094
  error:
    include-message: always
    include-binding-errors: always
    # 기본은 message만 내려주고, 필요할 때만 `?trace=true`로 stacktrace를 노출
    include-stacktrace: on_param
    include-exception: false

uengine:
  messaging:
    mode: ${UENGINE_MESSAGING_MODE:polling}
    polling:
      interval-ms: 1000
      batch-size: 50
      max-try-cnt: 3                          # dispatch 실패 시 최대 시도 횟수 (도달 시 dead-letter)
      inbox-ttl-hours: 24
      inbox-ttl-cron: "0 0 3 * * ?"
  definition:
    sync-on-startup:
      enabled: true
      clear-all-event-mappings: false

logging:
  charset:
    console: UTF-8
    file: UTF-8
  level:
    org.uengine: debug
  file:
    name: /hli_app/log/was/domains/LBM_PROCESS_11/applog/bpm-process.log
  pattern:
    console: "[%d{yyyy-MM-dd HH:mm:ss.SSS}] [%thread] [%level] [%logger] - %msg%n"

filter:
  payload:
    enabled: false
---
# 개발 환경 (기본 프로파일)
# WAS(Tomcat 등)에 DataSource JNDI를 등록한 뒤 실행: SPRING_PROFILES_ACTIVE=dev
spring:
  config:
    activate:
      on-profile: dev
  # cloud:
  #   function:
  #     definition: bpm
  #   stream:
  #     kafka:
  #       binder:
  #         brokers: ${KAFKA_BROKERS:localhost:9092}
  #       streams:
  #         binder:
  #           configuration:
  #             default:
  #               key:
  #                 serde: org.apache.kafka.common.serialization.Serdes$StringSerde
  #               value:
  #                 serde: org.apache.kafka.common.serialization.Serdes$StringSerde
  #     bindings:
  #       bpm-in-0:
  #         group: bpm
  #         destination: bpm-topic
  #         contentType: application/json
  #       bpm-out:
  #         destination: bpm-topic
  #         contentType: application/json
  #       bpm-brodcast:
  #         destination: bpm-brodcast
  #         contentType: application/json
  datasource:
    jndi-name: ${DATASOURCE_JNDI_NAME:java:comp/env/jdbc/uengine}
  jpa:
    database-platform: org.uengine.five.config.Oracle12cDialectWithRegexp
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
      hibernate.metadata_builder_contributor: org.uengine.five.config.OracleHibernateMetadataContributor

uengine:
  definition:
    basePath: ${UENGINE_BASEPATH:D:\uEngineProject\uEngine6-jdk21}
  # 감사 로그: 저장소 유연 구성 (jpa | file | composite | none)
  audit:
    sink: none     # Method 0: None (기본)
    # sink: jpa      # Method 1: DB
    # sink: file       # Method 2: File (경로는 file.basePath만 사용, definition과 별도)
    # file:
    #   basePath: ${UENGINE_AUDIT_BASEPATH:/Users/heon/Documents/workspace/uEngine6-bpm/bpm-audit-log}
    #   format: json
    # sink: composite # Method 3: Composite
    # sinkNames: jpa,file

keycloak:
  url: ${KEYCLOAK_URI:http://localhost:8080}
  realm: ${KEYCLOAK_ADMIN_REALM:master}
  clientId: ${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
  username: ${KEYCLOAK_ADMIN_USERNAME:${KEYCLOAK_USERNAME:admin}}
  password: ${KEYCLOAK_ADMIN_PASSWORD:${KEYCLOAK_PASSWORD:admin}}

external:
  iam:
    base-url: ${EXTERNAL_IAM_BASE_URL:}

esb:
  base-url: ${ESB_BASE_URL:http://dev-esb.company.com/esb}
  connect-timeout-ms: ${ESB_CONNECT_TIMEOUT_MS:5000}
  read-timeout-ms: ${ESB_READ_TIMEOUT_MS:10000}

logging:
  level:
    org.hibernate.type: trace
    org.springframework.cloud: debug

