# process-service 전용 uengine 설정
# GlobalContext가 클래스패스에서 org/uengine/uengine.properties를 로드하므로
# Spring 부팅 전에 이 값들이 결정됩니다.

# RoleMapping 구현체: IAMService 기반 구현체 사용 (core의 DefaultCompanyRoleMapping 대체)
rolemapping.class=org.uengine.five.service.IAMCompanyRoleMapping

# IAM 공급자 선택 (환경변수 IAM_PROVIDER로 오버라이드 가능)
iam.provider=keycloak

# Event Inbox 공급자 선택 (환경변수 EVENT_INBOX_PROVIDER로 오버라이드 가능)
# default(기본) | external
# event-inbox.provider=external

# 외부 IAM BASE_URL (환경변수 EXTERNAL_IAM_BASE_URL로 오버라이드 가능)
# external.iam.base.url=http://localhost:9090/iam
