            - Path=/definition/**, /version/**, /versions/**
        - id: instance-servicce
          uri: ${PROCESS_SERVICE_URI:http://localhost:9094}
          predicates:
            - Path=/worklist/**, /test/**, /instance/**, /work-item/** , /instances/**, /dry-run/**, /validate/**, /start-and-complete
        - id: frontend
          uri: ${keycloak-client.frontend-uri}
          predicates:
            - Path=/**
      globalcors:
        corsConfigurations:
          '[/**]':
