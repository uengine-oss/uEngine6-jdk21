
server:
  port: ${GATEWAY_PORT:8088}

keycloak-client:
  server-url: ${KEYCLOAK_URI:http://localhost:8080}
  realm: ${KEYCLOAK_REALM:uengine}
  client-id: ${KEYCLOAK_CLIENT_ID:uengine}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:66LpF19OpkpgKKpWHdgiCEKisx5AXqLA}
  gateway-uri: ${GATEWAY_URI:http://localhost:8088}
  frontend-uri: ${FRONTEND_URI:http://localhost:5173}

---

spring:
  config:
    activate:
      on-profile: default
  cloud:
    gateway:
      routes:
        - id: execution
          uri: http://localhost:8000
          predicates:
            - Path=/complete/**, /vision-complete/**, /execution/**
          filters:
            - RewritePath=/execution/?(?<segment>.*), /$\{segment}
        - id: definition-servicce
          uri: http://localhost:9093
          predicates:
            - Path=/definition/**, /version/**, /versions/**
        - id: instance-servicce
          uri: http://localhost:9094
          predicates:
            - Path=/worklist/**, /test/**, /instance/**, /work-item/** , /instances/**, /dry-run/**, /validate/**, /start-and-complete
        # - id: inventory-service
        #   uri: http://localhost:8080
        #   predicates: 
        #     - Path=/inventories/**, /url-test/**
        - id: frontend
          uri: ${keycloak-client.frontend-uri}
          predicates:
            - Path=/**
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - "*"
            allowedMethods:
              - "*"
            allowedHeaders:
              - "*"
            allowCredentials: true

---

spring:
  config:
    activate:
      on-profile: docker
  cloud:
    gateway:
      routes:
        - id: execution
          uri: http://localhost:8000
          predicates:
            - Path=/complete/**, /vision-complete/**,  
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "*"
            allowedMethods:
              - "*"
            allowedHeaders:
              - "*"
            allowCredentials: true
  security:
    oauth2:
      client:
        provider:
          keycloak:
            issuer-uri: ${keycloak-client.server-url}/realms/${keycloak-client.realm}
            user-name-attribute: preferred_username
        registration:
          keycloak:
            client-id: ${keycloak-client.client-id}
            client-secret: ${keycloak-client.client-secret}
            redirect-uri: ${keycloak-client.gateway-uri}/login/oauth2/code/keycloak
            authorization-grant-type: authorization_code
            scope: openid
      resourceserver:
        jwt:
          jwk-set-uri: ${keycloak-client.server-url}/realms/${keycloak-client.realm}/protocol/openid-connect/certs

server:
  port: ${GATEWAY_PORT:8080}

---

spring:
