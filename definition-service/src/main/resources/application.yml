spring:
  application:
    name: definition
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

server:
  port: 9093
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false

uengine:
  messaging:
    mode: ${UENGINE_MESSAGING_MODE:polling}
    polling:
      consumer-id: definition-service

logging:
  charset:
    console: UTF-8
    file: UTF-8
  level:
    org.uengine: debug
  file:
    name: /hli_app/log/was/domains/LBM_DEFINITION_11/applog/bpm-definition.log
  pattern:
    console: "[%d{yyyy-MM-dd HH:mm:ss.SSS}] [%thread] [%level] [%logger] - %msg%n"
---
# 개발 환경 (기본 프로파일)
# WAS(Tomcat 등)에 DataSource JNDI를 등록한 뒤 실행: SPRING_PROFILES_ACTIVE=dev
spring:
  config:
    activate:
      on-profile: dev
  # cloud:
  #   stream:
  #     kafka:
  #       binder:
  #         brokers: ${KAFKA_BROKERS:localhost:9092}
  #       streams:
  #         binder:
  #           configuration:
  #             default:
  #               key:
  #                 serde: org.apache.kafka.common.serialization.Serdes$StringSerde
  #               value:
  #                 serde: org.apache.kafka.common.serialization.Serdes$StringSerde
  #     bindings:
  #       bpm-in-0:
  #         group: definition
  #         destination: bpm-topic
  #         contentType: application/json
  #       bpm-out:
  #         destination: bpm-topic
  #         contentType: application/json
  datasource:
    jndi-name: ${DATASOURCE_JNDI_NAME:java:comp/env/jdbc/uengine}
  jpa:
    database-platform: org.hibernate.dialect.Oracle12cDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true

uengine:
  definition:
    basePath: ${UENGINE_BASEPATH:D:\uEngineProject\uEngine6-jdk21}

logging:
  level:
    org.hibernate.type: trace
    org.springframework.cloud: debug

---
# QA 환경
# WAS에 QA용 DataSource JNDI 등록 후 실행: SPRING_PROFILES_ACTIVE=qa
spring:
  config:
    activate:
      on-profile: qa
  # cloud:
  #   stream:
  #     kafka:
  #       binder:
  #         brokers: ${KAFKA_BROKERS:localhost:9092}
  #       streams:
  #         binder:
