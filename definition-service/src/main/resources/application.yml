  #     bindings:
  #       bpm-in-0:
  #         group: definition
  #         destination: bpm-topic
  #         contentType: application/json
  #       bpm-out:
  #         destination: bpm-topic
  #         contentType: application/json
  datasource:
    jndi-name: ${DATASOURCE_JNDI_NAME:java:comp/env/jdbc/uengine}
  jpa:
    database-platform: org.hibernate.dialect.Oracle12cDialect
    hibernate:
      ddl-auto: validate

uengine:
  definition:
    basePath: ${UENGINE_BASEPATH:/data/uengine/qa}

logging:
  level:
    org.hibernate.type: info
    org.springframework.cloud: info

