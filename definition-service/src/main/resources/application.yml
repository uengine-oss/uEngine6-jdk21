server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false
spring:
  application:
    name: definition
  main:
    allow-bean-definition-overriding: true
---

uengine:
  # Messaging 전략 선택. kafka | polling (process-service 의 값과 일치시킬 것).
  messaging:
    mode: ${UENGINE_MESSAGING_MODE:polling}
    polling:
      consumer-id: definition-service
  definition:
    basePath: ${UENGINE_BASEPATH:D:\uEngineProject\uEngine6-jdk21}
    
    
        
spring:
  profiles:
    # active: ${SPRING_PROFILES_ACTIVE:default}
    active: ${SPRING_PROFILES_ACTIVE:postgres}
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true

logging:
  level:
    org.hibernate.type: trace
    org.springframework.cloud: debug


server:
  port: 9093

---
spring:
  config:
    activate:
      on-profile: docker
# docker 환경의 Kafka 브로커는 messaging-kafka 프로파일 + KAFKA_BROKERS 로 주입.

---
# DB: Oracle (oracle 폴더 Docker 실행 후 SPRING_PROFILES_ACTIVE=oracle)
# Oracle 컨테이너가 완전히 뜬 뒤(2~3분) 앱 실행. system/oracle = docker-compose ORACLE_PASSWORD.
# (APP_USER uengine는 첫 기동 시에만 생성되므로, 크래시 후 재기동한 DB는 system 사용)
spring:
  config:
    activate:
      on-profile: oracle
  datasource:
    url: jdbc:oracle:thin:@${ORACLE_HOST:localhost}:${ORACLE_PORT:1521}:XE
    username: ${ORACLE_USER:system}
    password: ${ORACLE_PASSWORD:oracle}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      connection-timeout: 30000
      initialization-fail-timeout: 30000
  jpa:
    database-platform: org.hibernate.dialect.Oracle12cDialect
    hibernate:
      ddl-auto: update

---
# DB: PostgreSQL (infra/docker-compose.postgres.yml 기동 후 SPRING_PROFILES_ACTIVE=postgres)
# 호스트에서 앱 실행 시: POSTGRES_HOST=localhost (기본값). Docker 네트워크 내에서는 postgres.
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:uengine}
    username: ${POSTGRES_USER:uengine}
    password: ${POSTGRES_PASSWORD:uengine}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      initialization-fail-timeout: 30000
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update

---
# Spring Cloud Stream + Kafka. uengine.messaging.mode=kafka 일 때만 자동 활성화 (DefinitionServiceApplication 의 ContextInitializer).
spring:
  config:
    activate:
      on-profile: messaging-kafka
  cloud:
    stream:
      kafka:
        binder:
          brokers: ${KAFKA_BROKERS:localhost:9092}
        streams:
          binder:
            configuration:
              default:
                key:
                  serde: org.apache.kafka.common.serialization.Serdes$StringSerde
                value:
                  serde: org.apache.kafka.common.serialization.Serdes$StringSerde
      bindings:
        bpm-in-0:
          group: definition
          destination: bpm-topic
          contentType: application/json
        bpm-out:
          destination: bpm-topic
          contentType: application/json
